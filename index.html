<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人財務管理工具</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>財務記帳工具</h1>
        
        <div id="auth-section">
            <button id="auth-btn">登入 Google 帳號</button>
        </div>

        <div id="app-section" style="display: none;">
            <form id="record-form">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" id="date" required>
                </div>
                
                <div class="form-group">
                    <label>帳戶</label>
                    <select id="account-id" required>
                        <option value="">請選擇帳戶</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>帳務類型</label>
                    <select id="type-id" required disabled>
                        <option value="">請先選擇帳戶</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>收付方式</label>
                    <select id="payment-id" required disabled>
                        <option value="">請先選擇帳戶</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>帳務類別</label>
                    <input type="text" id="category" placeholder="如：食、衣、住、行" required>
                </div>

                <div class="form-group">
                    <label>金額</label>
                    <input type="number" id="amount" required>
                </div>

                <button type="submit" id="submit-btn">儲存紀錄</button>
            </form>

            <hr>

            <div class="dashboard">
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
                <div id="monthly-summary">
                    <h3>本月摘要</h3>
                    <p>總收入：<span id="total-income">0</span></p>
                    <p>總支出：<span id="total-expense">0</span></p>
                </div>
            </div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="app.js"></script>
</body>
</html>
